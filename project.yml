name: GeoGuesser
options:
  bundleIdPrefix: com.ansh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  GeoGuesser:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GeoGuesser
    info:
      path: GeoGuesser/Info.plist
      properties:
        NSPhotoLibraryUsageDescription: "GeoGuesser needs access to your photos to let you guess when and where they were taken."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ansh.GeoGuesser
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
